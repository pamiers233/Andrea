<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amdrea - CLAVICORDIVM MAXIMVM</title>
    <link rel="stylesheet" href="../css/piano.css">
    <!-- Include Tone.js for Karplus-Strong string synthesis -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
</head>

<body>
    <!-- SVG Filters for Sketch/Glow Effects -->
    <svg style="display: none;">
        <defs>
            <filter id="sketch" x="-10%" y="-10%" width="120%" height="120%">
                <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"
                    result="displaced" />
            </filter>
            <filter id="hl-glow-piano" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur stdDeviation="3" result="blur" />
                <feComponentTransfer in="blur" result="glow">
                    <feFuncR type="linear" slope="1.5" />
                    <feFuncG type="linear" slope="1.1" />
                    <feFuncB type="linear" slope="0.3" />
                </feComponentTransfer>
                <feMerge>
                    <feMergeNode in="glow" />
                    <feMergeNode in="SourceGraphic" />
                </feMerge>
            </filter>
            <pattern id="crosshatch" patternUnits="userSpaceOnUse" width="8" height="8">
                <path d="M-2,2 l4,-4 M0,8 l8,-8 M6,10 l4,-4" stroke="rgba(58, 42, 26, 0.4)" stroke-width="0.5" />
                <path d="M-2,6 l4,4 M0,0 l8,8 M6,-2 l4,4" stroke="rgba(58, 42, 26, 0.4)" stroke-width="0.5" />
            </pattern>
        </defs>
    </svg>

    <!-- Entrance Animation -->
    <div id="entrance-overlay" class="entrance-overlay">
        <svg class="entrance-svg" viewBox="0 0 500 500">
            <g class="entrance-draw" fill="none" stroke="#daa520" stroke-width="2" style="stroke-linecap:round;">
                <!-- Abstract Grand Piano Harp Shape -->
                <path d="M 150 400 L 350 400 L 350 350 Q 300 150 250 100 Q 150 150 150 350 Z" />
                <line x1="200" y1="350" x2="250" y2="150" />
                <line x1="250" y1="350" x2="300" y2="150" />
                <line x1="160" y1="400" x2="340" y2="400" />
            </g>
        </svg>
        <h1 class="entrance-title">CLAVICORDIVM MAXIMVM</h1>
        <div class="entrance-sub">Gravicembalo col piano e forte</div>
    </div>

    <!-- Main Content -->
    <div class="main-container" id="main-container">
        <a href="index.html" class="back-link">⟵ REVERSVS</a>
        <button class="keyboard-toggle-btn" id="openKeyboardBtn">Claviatura Interactiva</button>

        <!-- Interactive Keyboard Modal -->
        <div class="keyboard-modal" id="keyboardModal">
            <div class="keyboard-header">
                <span class="keyboard-title">Claviatura (88 Keys)</span>
                <button class="keyboard-close" id="closeKeyboardBtn">&times;</button>
            </div>
            <div class="keyboard-container">
                <div class="keyboard-inner" id="playableKeyboardInner"></div>
            </div>
        </div>

        <div class="parchment">
            <!-- Left Pane: Latin Text -->
            <div class="parchment-left" id="parchmentLeft">
                <svg id="quill-svg" viewBox="0 0 280 780">
                    <text x="0" y="40" class="quill-title">C</text>
                    <text x="25" y="40" class="quill-title" style="font-size: 18px">LAVICORDIVM MAX.</text>

                    <path d="M0,50 Q100,50 150,55 T280,50" class="quill-ornament" fill="none" />

                    <text x="0" y="80" class="quill-line">"Musica est exercitium</text>
                    <text x="0" y="105" class="quill-line">arithmeticae nescientis se</text>
                    <text x="0" y="130" class="quill-line">numerare animi."</text>
                    <text x="180" y="155" class="quill-date">— Leibniz</text>

                    <text x="0" y="200" class="quill-line">Instrumentum mirabile,</text>
                    <text x="0" y="225" class="quill-line">quod forte et piano in</text>
                    <text x="0" y="250" class="quill-line">se coniungit, ut vox</text>
                    <text x="0" y="275" class="quill-line">humana cantare posset.</text>

                    <path d="M40,305 Q140,295 240,305" class="quill-ornament" fill="none" />

                    <text x="0" y="340" class="quill-line">Auctore Bartolomeo</text>
                    <text x="0" y="365" class="quill-line">Cristofori (MDCC)</text>

                    <text x="0" y="415" class="quill-line">Machina multiplex</text>
                    <text x="0" y="440" class="quill-line">nervos ferreos malleis</text>
                    <text x="0" y="465" class="quill-line">pelliculis percutit.</text>

                    <path d="M0,500 L280,500" class="quill-ornament" fill="none" stroke-dasharray="2 4" />

                    <text x="0" y="535" class="quill-line">Tabula resonans vocem</text>
                    <text x="0" y="560" class="quill-line">ad corda aetherea</text>
                    <text x="0" y="585" class="quill-line">diffundit per saecula.</text>
                </svg>

                <svg id="quill-pen" viewBox="0 0 50 150">
                    <path d="M25,140 Q30,80 40,20 Q45,0 35,5 Q15,40 25,140Z" fill="url(#featherGradient)"
                        stroke="#3a2a1a" stroke-width="0.5" />
                    <path d="M25,140 Q25,145 23,148 L25,150 L27,148 Q25,145 25,140Z" fill="#111" />
                    <line x1="25" y1="148" x2="25" y2="142" stroke="#fff" stroke-width="0.3" />
                    <path d="M25,140 Q28,100 35,25" fill="none" stroke="#fff" stroke-width="1.5" />
                    <defs>
                        <linearGradient id="featherGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="#ffffff" />
                            <stop offset="50%" stop-color="#e8e0d5" />
                            <stop offset="100%" stop-color="#d3c2a8" />
                        </linearGradient>
                    </defs>
                </svg>
            </div>

            <!-- Right Pane: Piano Mechanics -->
            <div class="parchment-right">
                <div class="piano-layout">
                    <div class="label-column label-column-left" id="leftLabels"></div>
                    <div class="piano-center">
                        <div class="piano-wrapper" id="pianoWrapper">
                            <svg id="piano-svg" viewBox="0 0 500 650"></svg>
                        </div>
                        <div class="piano-controls">
                            <div class="piano-hint" id="piano-hint">Gemini Ictus ad Dissolvendum (Double Click to
                                Explode)</div>
                            <button id="reassembleBtn" class="control-btn" style="display:none;">Restaurare
                                (Reassemble)</button>
                        </div>
                    </div>
                    <div class="label-column label-column-right" id="rightLabels"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Feature Demo Slide-in Panel -->
    <div class="feature-panel" id="feature-panel">
        <button class="close-panel-btn" id="closePanel">&times;</button>
        <div class="feature-panel-inner">
            <div class="fp-title" id="featureTitle">Feature Title</div>
            <div class="fp-desc" id="featureDesc">Feature description text goes here.</div>

            <div class="fp-demo-section">
                <div class="fp-demo-title">Demonstratio Mechanica</div>
                <div class="fp-demo" id="featureDemo">
                    <!-- Dynamic SVG Demo injected by JS -->
                </div>
                <div class="fp-demo-note" id="featureDemoNote">Notes about the demo.</div>
            </div>

            <div class="fp-details" id="featureDetails">
                <!-- Detailed historical/technical context injected by JS -->
            </div>
        </div>
    </div>

    <script src="../js/piano.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三问怀表 — Minute Repeater</title>
    <link rel="stylesheet" href="../css/watch.css">
</head>

<body>

    <!-- Entrance: Pocket watch outline drawing -->
    <div id="entrance-overlay" class="entrance-overlay">
        <svg class="entrance-svg" viewBox="0 0 400 500">
            <g class="entrance-draw" fill="none" stroke="#f4e4c1" stroke-width="1.5">
                <circle cx="200" cy="42" r="18" />
                <rect x="193" y="56" width="14" height="18" rx="3" />
                <circle cx="200" cy="260" r="170" />
                <circle cx="200" cy="260" r="155" />
                <circle cx="200" cy="260" r="140" />
                <line x1="200" y1="125" x2="200" y2="138" />
                <line x1="200" y1="382" x2="200" y2="395" />
                <line x1="65" y1="260" x2="78" y2="260" />
                <line x1="322" y1="260" x2="335" y2="260" />
                <line x1="200" y1="260" x2="200" y2="165" stroke-width="2.5" />
                <line x1="200" y1="260" x2="258" y2="218" stroke-width="1.8" />
                <circle cx="200" cy="260" r="5" />
            </g>
            <text x="200" y="148" text-anchor="middle" font-family="'EB Garamond',serif" font-size="16" fill="#f4e4c1"
                stroke="none" opacity="0" style="animation: fadeUp 1s 2.5s forwards">XII</text>
            <text x="200" y="388" text-anchor="middle" font-family="'EB Garamond',serif" font-size="16" fill="#f4e4c1"
                stroke="none" opacity="0" style="animation: fadeUp 1s 2.8s forwards">VI</text>
            <text x="82" y="265" text-anchor="middle" font-family="'EB Garamond',serif" font-size="16" fill="#f4e4c1"
                stroke="none" opacity="0" style="animation: fadeUp 1s 3s forwards">IX</text>
            <text x="318" y="265" text-anchor="middle" font-family="'EB Garamond',serif" font-size="16" fill="#f4e4c1"
                stroke="none" opacity="0" style="animation: fadeUp 1s 3.2s forwards">III</text>
        </svg>
        <h1 class="entrance-title">REPETITIŌ MINVTĀRVM</h1>
        <p class="entrance-sub">Horologium Repetens · Ars Mechanica</p>
    </div>

    <!-- Main container -->
    <div id="main-container" class="main-container">
        <a href="index.html" class="back-link">&larr; 返回首页</a>

        <div class="parchment">
            <!-- LEFT: Latin text with quill writing -->
            <div class="parchment-left" id="parchmentLeft">
                <svg id="quill-svg" class="quill-svg" viewBox="0 0 280 780">
                    <text class="quill-title" x="140" y="45" text-anchor="middle">DE HOROLOGIO</text>
                    <text class="quill-title" x="140" y="75" text-anchor="middle">REPETENTE</text>
                    <text class="quill-title" x="140" y="105" text-anchor="middle">MINVTARVM</text>

                    <line class="quill-ornament" x1="50" y1="125" x2="230" y2="125" />

                    <text class="quill-line" x="15" y="160">Horologium repetens</text>
                    <text class="quill-line" x="15" y="185">est opus mechanicum</text>
                    <text class="quill-line" x="15" y="210">summae artis et</text>
                    <text class="quill-line" x="15" y="235">ingenii humani.</text>

                    <text class="quill-line" x="15" y="275">Sonum temporis edit</text>
                    <text class="quill-line" x="15" y="300">ut dominus horam</text>
                    <text class="quill-line" x="15" y="325">quadrantem minutas</text>
                    <text class="quill-line" x="15" y="350">audire possit etiam</text>
                    <text class="quill-line" x="15" y="375">in tenebris noctis.</text>

                    <text class="quill-line" x="15" y="415">Artifex peritus</text>
                    <text class="quill-line" x="15" y="440">malleos et tympana</text>
                    <text class="quill-line" x="15" y="465">componit ut harmonia</text>
                    <text class="quill-line" x="15" y="490">sonorum tempus</text>
                    <text class="quill-line" x="15" y="515">indicet fideliter.</text>

                    <text class="quill-line" x="15" y="555">Elastrum principale</text>
                    <text class="quill-line" x="15" y="580">vim praebet dum rota</text>
                    <text class="quill-line" x="15" y="605">inhibitionis cursum</text>
                    <text class="quill-line" x="15" y="630">librationis gubernat.</text>

                    <line class="quill-ornament" x1="60" y1="660" x2="220" y2="660" />

                    <text class="quill-date" x="140" y="690" text-anchor="middle">ANNO DOMINI</text>
                    <text class="quill-date" x="140" y="715" text-anchor="middle">MDCCLXXV</text>

                    <line class="quill-ornament" x1="90" y1="735" x2="190" y2="735" />
                </svg>

                <!-- Quill pen overlay -->
                <svg id="quill-pen" class="quill-pen" viewBox="0 0 60 90">
                    <path d="M30,90 Q32,60 34,30 Q36,15 50,2 Q42,12 36,28 L30,90Z" fill="#3a2a1a" opacity="0.7" />
                    <path d="M30,90 Q28,60 26,30 Q24,15 10,2 Q18,12 24,28 L30,90Z" fill="#4a3a2a" opacity="0.5" />
                    <line x1="30" y1="90" x2="30" y2="86" stroke="#1a0a00" stroke-width="1.5" />
                </svg>
            </div>

            <!-- RIGHT: Watch area -->
            <div class="parchment-right">
                <div class="watch-layout">
                    <div class="label-column label-column-left" id="leftLabels"></div>

                    <div class="watch-center">
                        <div class="watch-wrapper" id="watchWrapper">
                            <svg id="watch-svg" viewBox="0 0 500 520" xmlns="http://www.w3.org/2000/svg">
                                <defs>
                                    <filter id="sketch" x="-3%" y="-3%" width="106%" height="106%">
                                        <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2"
                                            result="n" />
                                        <feDisplacementMap in="SourceGraphic" in2="n" scale="1.2" xChannelSelector="R"
                                            yChannelSelector="G" />
                                    </filter>
                                    <filter id="hl-glow-watch">
                                        <feGaussianBlur stdDeviation="4" result="b" />
                                        <feFlood flood-color="#daa520" flood-opacity="0.6" result="c" />
                                        <feComposite in="c" in2="b" operator="in" result="g" />
                                        <feMerge>
                                            <feMergeNode in="g" />
                                            <feMergeNode in="g" />
                                            <feMergeNode in="SourceGraphic" />
                                        </feMerge>
                                    </filter>
                                    <pattern id="crosshatch" width="6" height="6" patternUnits="userSpaceOnUse"
                                        patternTransform="rotate(45)">
                                        <line x1="0" y1="0" x2="0" y2="6" stroke="#3a2a1a" stroke-width="0.3"
                                            opacity="0.12" />
                                    </pattern>
                                    <linearGradient id="brass-watch" x1="0" y1="0" x2="0" y2="1">
                                        <stop offset="0%" stop-color="#d4a54a" />
                                        <stop offset="50%" stop-color="#b8860b" />
                                        <stop offset="100%" stop-color="#8b6914" />
                                    </linearGradient>
                                </defs>
                                <!-- Watch parts generated by JS -->
                            </svg>

                            <div class="watch-controls">
                                <button id="reassembleBtn" class="control-btn" style="display:none">↺ 复原怀表</button>
                                <span id="watch-hint" class="watch-hint">双击怀表以拆解</span>
                            </div>
                        </div>
                    </div>

                    <div class="label-column label-column-right" id="rightLabels"></div>
                </div>
            </div>
        </div>

        <!-- Feature panel -->
        <div id="feature-panel" class="feature-panel">
            <button id="closePanel" class="close-panel-btn">&times;</button>
            <div class="feature-panel-inner">
                <h2 id="featureTitle" class="fp-title"></h2>
                <p id="featureDesc" class="fp-desc"></p>
                <div class="fp-demo-section">
                    <h3 class="fp-demo-title">🎬 动画演示</h3>
                    <div id="featureDemo" class="fp-demo"></div>
                    <p id="featureDemoNote" class="fp-demo-note"></p>
                </div>
                <div id="featureDetails" class="fp-details"></div>
            </div>
        </div>
    </div>

    <script src="../js/watch.js"></script>
</body>

</html>
